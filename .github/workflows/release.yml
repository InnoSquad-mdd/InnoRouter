name: release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example 4.1.0-rc.1"
        required: true
        type: string
      prerelease:
        description: "Publish as a GitHub pre-release without updating /latest/"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      update_latest: ${{ steps.version.outputs.update_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Swift Version
        run: swift --version

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Validate Release Tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          GA_REGEX='^[0-9]+\.[0-9]+\.[0-9]+$'
          PRERELEASE_REGEX='^[0-9]+\.[0-9]+\.[0-9]+-(rc|beta)\.[0-9]+$'

          if [[ "$PRERELEASE" == "true" ]]; then
            if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
              echo "Pre-release publishing is only allowed through workflow_dispatch." >&2
              exit 1
            fi
            if [[ ! "$TAG" =~ $PRERELEASE_REGEX ]]; then
              echo "Pre-release tags must use <major>.<minor>.<patch>-(rc|beta).<n> (for example 4.1.0-rc.1)." >&2
              exit 1
            fi
          elif [[ ! "$TAG" =~ $GA_REGEX ]]; then
            echo "GA release tags must use bare semantic versioning (for example 4.0.0)." >&2
            exit 1
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          if [[ "$PRERELEASE" == "true" ]]; then
            echo "update_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Existing gh-pages Site
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: .build/gh-pages-cache
          fetch-depth: 1

      - name: Run Principle Gates
        run: ./scripts/principle-gates.sh

      - name: Build Versioned DocC Site
        shell: bash
        run: |
          latest_args=()
          if [[ "${{ steps.version.outputs.update_latest }}" != "true" ]]; then
            latest_args+=(--skip-latest)
          fi

          if [[ -d ".build/gh-pages-cache" && -f ".build/gh-pages-cache/index.html" ]]; then
            ./scripts/build-docc-site.sh --version "${{ steps.version.outputs.version }}" --existing-site-dir .build/gh-pages-cache "${latest_args[@]}"
          else
            ./scripts/build-docc-site.sh --version "${{ steps.version.outputs.version }}" "${latest_args[@]}"
          fi

      - name: Package Release Site Artifact
        run: tar -czf .build/docc-site-release.tar.gz -C .build docc-site

      - name: Upload Release Site Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docc-site-release
          path: .build/docc-site-release.tar.gz

  publish-gh-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Release Site Artifact
        uses: actions/download-artifact@v8
        with:
          name: docc-site-release
          path: .build/release-site-artifact

      - name: Extract Release Site Artifact
        run: |
          mkdir -p .build
          tar -xzf .build/release-site-artifact/docc-site-release.tar.gz -C .build

      - name: Publish gh-pages Storage Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .build/docc-site
          force_orphan: false
          enable_jekyll: false

  create-release:
    needs:
      - build
      - publish-gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: InnoRouter ${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            Documentation
            - Release: https://innosquadcorp.github.io/InnoRouter/${{ needs.build.outputs.version }}/
            - Latest release docs: https://innosquadcorp.github.io/InnoRouter/latest/

            Repository references
            - README: https://github.com/InnoSquadCorp/InnoRouter/blob/${{ needs.build.outputs.version }}/README.md
            - Release checklist: https://github.com/InnoSquadCorp/InnoRouter/blob/${{ needs.build.outputs.version }}/RELEASING.md
