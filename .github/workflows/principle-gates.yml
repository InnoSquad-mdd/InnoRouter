name: principle-gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  gates:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift Version
        run: swift --version

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Run Principle Gates
        run: ./scripts/principle-gates.sh
