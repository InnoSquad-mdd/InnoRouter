name: principle-gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Xcode is pinned (rather than `latest-stable`) so runs of this
      # workflow are reproducible across the lifetime of a release.
      # Swift 6.2 is the floor declared in Package.swift; the pinned
      # Xcode below satisfies that. Bump this pin from RELEASING.md's
      # checklist when cutting a new release — see the "Toolchain pin"
      # section there for the policy.
      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Run Principle Gates
        run: ./scripts/principle-gates.sh
