name: principle-gates

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Source-level lint gates run independently of the heavy
  # swift-test / DocC pipeline so they fail fast on grep-detectable
  # regressions (Hangul, legacy symbols, doc drift) without paying
  # the full build cost. Same script the parent `principle-gates.sh`
  # delegates to; running it in its own job lets the two slices
  # parallelize on PRs.
  lint:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Run source-level lint gates
        run: ./scripts/lint-source-gates.sh

  changelog-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The check needs both BASE_REF and HEAD reachable so it
          # can diff the touched paths.
          fetch-depth: 0

      - name: Verify CHANGELOG matches public-API baseline change
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: ./scripts/check-changelog-sync.sh

  gates:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Xcode is pinned (rather than a floating latest channel) so runs of this
      # workflow are reproducible across the lifetime of a release.
      # Swift 6.2 is the floor declared in Package.swift; the pinned
      # Xcode below satisfies that. Bump this pin from RELEASING.md's
      # checklist when cutting a new release — see the "Toolchain pin"
      # section there for the policy.
      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Install ripgrep
        run: brew install ripgrep

      - name: Run Principle Gates
        run: ./scripts/principle-gates.sh
