name: performance-smoke

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift Version
        run: swift --version

      # The script fails non-zero when any scaling ratio exceeds its
      # embedded threshold. Before this change the workflow only
      # uploaded the JSON — regressions needed manual artefact
      # inspection to catch.
      - name: Run Performance Smoke
        run: ./scripts/performance-smoke.sh .build/performance-smoke.json

      - name: Upload Performance Smoke Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke
          path: .build/performance-smoke.json
