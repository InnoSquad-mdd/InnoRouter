name: coverage

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Coverage uses the same pinned Xcode/Swift toolchain as the
      # principle-gates workflow so the codecov.io trend reflects the
      # exact build the gates validate. Bump alongside that workflow
      # when cutting a new release — see RELEASING.md.
      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Run tests with coverage
        run: swift test --enable-code-coverage --jobs 2

      - name: Generate lcov report
        run: |
          set -euo pipefail
          PROF_DATA=$(find .build -name 'default.profdata' -print -quit)
          if [[ -z "${PROF_DATA}" ]]; then
            echo "::error::default.profdata not found under .build/"
            exit 1
          fi
          # Collect every .xctest bundle and derive each primary binary path
          # explicitly rather than globbing inside Contents/MacOS, which would
          # also match files nested under the .dSYM (e.g. Relocations YAML).
          TEST_BINS=()
          while IFS= read -r XCTEST_BUNDLE; do
            BUNDLE_NAME=$(basename "${XCTEST_BUNDLE}" .xctest)
            TEST_BIN="${XCTEST_BUNDLE}/Contents/MacOS/${BUNDLE_NAME}"
            if [[ ! -x "${TEST_BIN}" ]]; then
              echo "::error::Test binary not executable at ${TEST_BIN}"
              exit 1
            fi
            TEST_BINS+=("${TEST_BIN}")
          done < <(find .build -type d -name '*.xctest' | sort)
          if [[ "${#TEST_BINS[@]}" -eq 0 ]]; then
            echo "::error::.xctest bundle not found under .build/"
            exit 1
          fi
          PRIMARY_BIN="${TEST_BINS[0]}"
          LLVM_COV_ARGS=("${PRIMARY_BIN}")
          for TEST_BIN in "${TEST_BINS[@]:1}"; do
            LLVM_COV_ARGS+=(-object "${TEST_BIN}")
          done
          echo "Using profdata: ${PROF_DATA}"
          printf 'Using binary:   %s\n' "${TEST_BINS[@]}"
          xcrun llvm-cov export \
            "${LLVM_COV_ARGS[@]}" \
            -instr-profile "${PROF_DATA}" \
            -format=lcov \
            -ignore-filename-regex='Tests|\.build|Examples|ExamplesSmoke' \
            > coverage.lcov
          wc -l coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
