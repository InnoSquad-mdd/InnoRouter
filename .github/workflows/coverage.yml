name: coverage

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Coverage uses the same pinned Xcode/Swift toolchain as the
      # principle-gates workflow so the codecov.io trend reflects the
      # exact build the gates validate. Bump alongside that workflow
      # when cutting a new release — see RELEASING.md.
      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Run tests with coverage
        run: swift test --enable-code-coverage --jobs 2

      - name: Generate lcov report
        run: |
          set -euo pipefail
          PROF_DATA=$(find .build -name 'default.profdata' -print -quit)
          if [[ -z "${PROF_DATA}" ]]; then
            echo "::error::default.profdata not found under .build/"
            exit 1
          fi
          TEST_BIN=$(find .build -path '*.xctest/Contents/MacOS/*' -type f -print -quit)
          if [[ -z "${TEST_BIN}" ]]; then
            TEST_BIN=$(find .build -name 'InnoRouterPackageTests' -type f -perm -u+x -print -quit || true)
          fi
          if [[ -z "${TEST_BIN}" ]]; then
            echo "::error::Test binary not found under .build/"
            exit 1
          fi
          echo "Using profdata: ${PROF_DATA}"
          echo "Using binary:   ${TEST_BIN}"
          xcrun llvm-cov export \
            "${TEST_BIN}" \
            -instr-profile "${PROF_DATA}" \
            -format=lcov \
            -ignore-filename-regex='Tests|\.build|Examples|ExamplesSmoke' \
            > coverage.lcov
          wc -l coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false
          verbose: true
