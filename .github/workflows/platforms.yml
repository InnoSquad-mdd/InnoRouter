name: platforms

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    name: build ${{ matrix.platform.name }}
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: iOS
            destination: "generic/platform=iOS Simulator"
          - name: iPadOS
            destination: "generic/platform=iOS Simulator"
          - name: macOS
            destination: "platform=macOS"
          - name: tvOS
            destination: "generic/platform=tvOS Simulator"
          - name: watchOS
            destination: "generic/platform=watchOS Simulator"
          - name: visionOS
            destination: "generic/platform=visionOS Simulator"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # This build job is compile-only. The authoritative macOS
      # correctness gate remains the `gates` workflow; these jobs catch
      # per-platform SwiftUI / availability regressions on a fixed
      # Xcode toolchain.
      #
      # Xcode is pinned (rather than `latest-stable`) so the platform
      # matrix stays reproducible across the lifetime of a release.
      # Swift 6.2 is the floor declared in Package.swift; the pinned
      # Xcode below satisfies that. Bump this pin from RELEASING.md's
      # checklist when cutting a new release — see the "Toolchain pin"
      # section there for the policy.
      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      # InnoRouterSwiftUI is the only target that actually exercises the
      # platform-specific SwiftUI hosts. Building it per platform gates
      # any latent #if os(...) breakage (e.g. NavigationSplitView on
      # watchOS, .fullScreenCover on macOS/visionOS, ornaments on
      # visionOS). Generic simulator destinations are intentional so
      # the compile-only gate does not depend on runner-specific device
      # names or installed runtime image names. The scheme naming
      # matches `xcodebuild -list` output from the Swift package.
      - name: Build InnoRouterSwiftUI for ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -scheme InnoRouterSwiftUI \
            -destination '${{ matrix.platform.destination }}' \
            -quiet

      - name: Build InnoRouterCore for ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -scheme InnoRouterCore \
            -destination '${{ matrix.platform.destination }}' \
            -quiet

      - name: Build InnoRouterDeepLink for ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -scheme InnoRouterDeepLink \
            -destination '${{ matrix.platform.destination }}' \
            -quiet

  platform-tests:
    name: test ${{ matrix.platform.name }}
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: tvOS
            destination: "tvOS Simulator"
            runtimePrefix: "com.apple.CoreSimulator.SimRuntime.tvOS"
          - name: watchOS
            destination: "watchOS Simulator"
            runtimePrefix: "com.apple.CoreSimulator.SimRuntime.watchOS"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select pinned Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Select ${{ matrix.platform.name }} simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          devices_json="$(mktemp)"
          xcrun simctl list devices available -j > "$devices_json"

          simulator_udid="$(python3 - "$devices_json" '${{ matrix.platform.runtimePrefix }}' <<'PY'
          import json
          import sys

          devices_path = sys.argv[1]
          runtime_prefix = sys.argv[2]

          with open(devices_path, encoding="utf-8") as handle:
              payload = json.load(handle)

          for runtime, devices in payload.get("devices", {}).items():
              if runtime_prefix not in runtime:
                  continue
              for device in devices:
                  if device.get("isAvailable", True):
                      print(device["udid"])
                      raise SystemExit(0)

          raise SystemExit(1)
          PY
          )" || true

          if [[ -z "$simulator_udid" ]]; then
            echo "No available ${{ matrix.platform.name }} simulator found."
            cat "$devices_json"
            exit 1
          fi

          echo "udid=$simulator_udid" >> "$GITHUB_OUTPUT"

      - name: Test InnoRouterPlatformTests for ${{ matrix.platform.name }}
        run: |
          xcodebuild test \
            -workspace .github/platform-tests.xcworkspace \
            -scheme InnoRouterPlatformTests \
            -destination 'platform=${{ matrix.platform.destination }},id=${{ steps.simulator.outputs.udid }}' \
            -destination-timeout 120 \
            -parallel-testing-enabled NO \
            -quiet
