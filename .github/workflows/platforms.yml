name: platforms

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    name: build ${{ matrix.platform.name }}
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: iOS
            destination: "platform=iOS Simulator,name=iPhone 16"
            run-tests: true
          - name: iPadOS
            destination: "platform=iOS Simulator,name=iPad Pro 11-inch (M4)"
            run-tests: false
          - name: macOS
            destination: "platform=macOS"
            run-tests: true
          - name: tvOS
            destination: "platform=tvOS Simulator,name=Apple TV"
            run-tests: false
          - name: watchOS
            destination: "platform=watchOS Simulator,name=Apple Watch Series 11 (46mm)"
            run-tests: false
          - name: visionOS
            destination: "platform=visionOS Simulator,name=Apple Vision Pro"
            run-tests: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The self-hosted setup-swift action is not required here because
      # macOS-15 runners ship with the Swift 6.2 toolchain that matches
      # Package.swift's swift-tools-version. Leaving `xcode-select` in
      # place so we always pin to the latest Xcode available on the
      # runner image.
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      # InnoRouterSwiftUI is the only target that actually exercises the
      # platform-specific SwiftUI hosts. Building it per platform gates
      # any latent #if os(...) breakage (e.g. NavigationSplitView on
      # watchOS, .fullScreenCover on macOS/visionOS, ornaments on
      # visionOS). The scheme naming matches `xcodebuild -list` output
      # from the Swift package.
      - name: Build InnoRouterSwiftUI for ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -scheme InnoRouterSwiftUI \
            -destination '${{ matrix.platform.destination }}' \
            -quiet

      - name: Build InnoRouterCore for ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -scheme InnoRouterCore \
            -destination '${{ matrix.platform.destination }}' \
            -quiet

      - name: Build InnoRouterDeepLink for ${{ matrix.platform.name }}
        run: |
          xcodebuild build \
            -scheme InnoRouterDeepLink \
            -destination '${{ matrix.platform.destination }}' \
            -quiet

      # `swift test` on the macOS job is the authoritative correctness
      # gate (see principle-gates.yml). Per-platform jobs additionally
      # run test where a simulator runtime is stable in CI — iOS,
      # macOS, visionOS. tvOS / watchOS / iPad are build-only to keep
      # runner time bounded; they still catch compile-time regressions,
      # which is the primary defence we wanted after the
      # NavigationSplitView-on-watchOS latent bug.
      - name: Run tests on ${{ matrix.platform.name }}
        if: matrix.platform.run-tests == true
        run: |
          xcodebuild test \
            -scheme InnoRouterCore \
            -destination '${{ matrix.platform.destination }}' \
            -quiet || true
