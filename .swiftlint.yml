included:
  - Package.swift
  - Sources
  - Tests
  - Examples
  - ExamplesSmoke

excluded:
  - .build
  - .swiftpm

only_rules:
  - redundant_discardable_let
  - implicit_optional_initialization
  - trailing_semicolon
  - unused_closure_parameter
  - unused_control_flow_label
  - unused_enumerated
  - unused_optional_binding
  # Catastrophic-regression guardrails. Today's largest files /
  # type bodies set the lower bound — these thresholds are picked
  # to sit just above them so the rule fires only when a *new*
  # file or type clearly exceeds the responsibility envelope.
  # Phase 5 of the 4.1.0 cleanup splits the largest SwiftUI
  # stores (ModalStore 837, FlowStore 793, NavigationStore 731)
  # into responsibility-scoped extensions; after that lands we
  # tighten the warning level toward 700 (file) / 350 (type).
  - file_length
  - type_body_length

# Both `warning:` and `error:` are set explicitly because
# `lint-source-gates.sh` runs swiftlint with `--strict`, which
# turns a `warning:` into a hard failure. The current ceilings
# accommodate the largest existing fixtures (PropertyTestSupport
# 1701 LOC, InnoRouterMacrosTests 885 LOC) and the largest
# production type body (ModalStore class 686 lines) without
# masking the next regression.
file_length:
  warning: 1800
  error: 2200
  ignore_comment_only_lines: true

type_body_length:
  # Temporary headroom until the 4.1.x store split tightens the
  # largest production type body below the long-term 700-line guard.
  warning: 730
  error: 900

reporter: "xcode"
